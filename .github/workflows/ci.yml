name: Continuous Integration

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  lint-python:
    name: Lint & Format Check (Python)
    runs-on: ubuntu-latest

    steps:
      # 1. Download the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies for the query-service
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r query-service/requirements.txt

      # 4. Check code formatting with Black
      - name: Check code formatting with Black
        run: |
          black --check query-service/src

      # 5. Check code style with Flake8
      - name: Check code style with Flake8
        run: |
          flake8 query-service/src
